# XXNplc made
# Last Modified: 2026/05/10 18:08:41
#---------------------全局配置---------------------
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true
#---------------------面板---------------------
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"
#---------------------GeoX配置---------------------
geodata-mode: true   #>>格式:DAT/MMDB true/false
geodata-loader: standard  #>>标准加载器/优化加载器 standard/memconservative
#---------------------GEOX下载地址---------------------
geox-url:
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
geo-auto-update: true
geo-update-interval: 24
#---------------------入站---------------------
tun:
  enable: true
  stack: mixed   #>>可选择 system/gvisor/mixed
  dns-hijack: ["any:53", "tcp://any:53"]
#>>使用仅内核自行修改下面三项为true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
#---------------------DNS---------------------
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
## 引导 DNS
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES
    - https://cloudflare-dns.com/dns-query#RULES
#---------------------节点------------------------
proxies:
- {name: 🇨🇳 DIRECT, type: direct}
#---------------------锚点---------------------
pr: &pr {type: select, proxies: [  🕹️Proxy, 🇨🇳 DIRECT, ✈️Smart-CF], use: [Airp1, Airp2]}
#---------------------策略组---------------------
proxy-groups:
#>>智能策略组------policy-priority: "AWS:1.2;IT7:1.1;DMIT:0.9" ,
  - {name:  🧱Smart, type: smart, uselightgbm: false, collectdata: true, interval: 300}
  - {name:  🕹️Proxy, type: select, proxies: [ 🧱Smart, 🇨🇳 DIRECT, ✈️Smart-CF]}
  - {name:  Apple, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Apple.png}
  - {name:  Spotify, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Spotify.png}
  - {name:  Speedtest, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Speedtest.png}
  - {name:  Microsoft, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Microsoft.png}
  - {name:  steam, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Steam.png}
  - {name:  AI, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/OpenAI.png}
  - {name:  PayPal, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Paypal.png}
  - {name:  🚫Block, type: select, hidden: true,  proxies: [REJECT, 🕹️Proxy, 🇨🇳 DIRECT]}
#---------------------规则匹配---------------------
rules:
# 1. 拦截
  - RULE-SET,category-ads-all_domain, 🚫Block
# 2. 内网与直连 (最高优先级)
  - IP-CIDR,240.0.0.0/4, 🚫Block, no-resolve
  - IP-CIDR,192.168.2.0/24, 🇨🇳 DIRECT, no-resolve
  - RULE-SET,private_domain, 🇨🇳 DIRECT
  - RULE-SET,proxy-dns, 🕹️Proxy
# 3. 特殊分流
  - RULE-SET,apple-cn_domain, 🇨🇳 DIRECT
  - RULE-SET,apple_domain, Apple
  - RULE-SET,douyin,🇨🇳 DIRECT
  - RULE-SET,microsoft_domain, Microsoft
  - RULE-SET,ai, AI
  - RULE-SET,spotify_domain, Spotify
  - RULE-SET,speedtest_domain, Speedtest
  - RULE-SET,paypal_domain, PayPal
  - RULE-SET,steam_domain, steam
  - RULE-SET,cn_domain, 🇨🇳 DIRECT
  - RULE-SET,private_ip, 🇨🇳 DIRECT, no-resolve
  - RULE-SET,cn_ip, 🇨🇳 DIRECT, no-resolve
# 5. 兜底 (所有剩下的国外/未知流量走代理)
  - MATCH, 🕹️Proxy
#---------------------规则锚点--------------------
## type：可选http/file/inline  behavior：可选domain/ipcidr/classical format：可选yaml/text/mrs
rule-anchor:
  ip_mrs: &ip_mrs {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain_mrs: &domain_mrs {type: http, interval: 86400, behavior: domain, format: mrs}
  class_text: &class_text {type: http, interval: 86400, behavior: classical, format: text}
  domain_text: &domain_text {type: http, interval: 86400, behavior: domain, format: text}
#---------------------域名类规则---------------------
rule-providers: 
  fakeipfilter_domain: {<<: *domain_text, url: "https://raw.githubusercontent.com/XXNplc/Configuration/refs/heads/main/mihomo/rule/fakeip-filter.list"}
  proxy-dns: { <<: *class_text, url: "https://raw.githubusercontent.com/XXNplc/Configuration/refs/heads/main/mihomo/rule/proxy-dns.list"}
  private_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  ai: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs" }
  paypal_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/paypal.mrs"}
  microsoft_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.mrs"}
  apple-cn_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/apple-cn.mrs"}
  apple_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.mrs"}
  speedtest_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/ookla-speedtest.mrs"}
  cn_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"}
#---------------------ip类规则-------------------
  private_ip: {<<: *ip_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"}
  cn_ip: { <<: *ip_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"}
#---------------------自定规则---------------------
  category-ads-all_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"}
  steam_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/steam.mrs"}
  douyin: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/douyin.mrs"}
  spotify_domain: { <<: *domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/spotify.mrs"}
